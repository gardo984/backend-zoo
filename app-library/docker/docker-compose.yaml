services:
  api:
    image: "malazo/app-library:${IMAGE_TAG-latest}"
    # platform: linux/amd64
    build:
      target: ${TARGET-dev}
      context: $PWD/
      dockerfile: $PWD/app/Dockerfile
      args:
          # for build purposes set your UID value here
          UID: ${UID-1000}
    restart: on-failure
    env_file: $PWD/config/.backend_env
    user: app
    tty: true
    entrypoint: ["./entrypoint.sh"]
    command: start
    ports:
        - "8001:8001"
        - "8000:8000"
    volumes:
        - $PWD/app:/usr/src/backend/app:rw
        - $PWD/tests:/usr/src/backend/tests:rw
        - $PWD/bin/entrypoint.sh:/usr/src/backend/entrypoint.sh:rw
        - $PWD/bin/wait-for-it.sh:/usr/src/backend/wait-for-it.sh:rw
        - $PWD/alembic.ini:/usr/src/backend/alembic.ini:rw
        - $PWD/cli.py:/usr/src/backend/cli.py:rw
        - $PWD/docker/nginx/nginx.conf:/etc/nginx/nginx.conf:rw
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
    - fastapi_library

  db:
    image: "mariadb:10.10"
    restart: on-failure
    env_file: $PWD/config/.db_env
    ports:
    - "3306:3306"
    volumes:
    - $PWD/bin/wait-for-it.sh:/tmp/wait-for-it.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "/tmp/wait-for-it.sh -h localhost -p 3306 || exit 1"]
    networks:
    - fastapi_library

  redis:
    image: "redis:7-alpine"
    restart: on-failure
    ports:
    - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
    - fastapi_library

    
networks:
  fastapi_library:
    name: fastapi-library
    driver: bridge
    external: false